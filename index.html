    <!-- Critical inline styles for LCP hero so it paints before JS loads -->
    <style>
      /* Plain white splash screen until React is ready */
      #aarohan-prerender-hero {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #ffffff;
        transition: opacity 0.4s ease-out;
        pointer-events: none;
      }
      #aarohan-prerender-hero.hero-hidden {
        opacity: 0;
      }
      #aarohan-prerender-hero.hero-removed {
        display: none;
      }
      /* React root fades in smoothly */
      #root {
        opacity: 0;
        transition: opacity 0.35s ease-out;
      }
      #root.root-ready {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <!-- React App Mount Point -->
    <div id="root"></div>

    <!-- White splash screen: visible before JS loads, fades out after React mounts -->
    <div id="aarohan-prerender-hero"></div>

    <script>
      // API config – let config.js override at runtime
      window.API_BASE_URL = window.API_BASE_URL || 'http://localhost:5000';
      window.APIBASEURL = window.API_BASE_URL || 'http://localhost:5000';
    </script>

    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Smooth handoff: watch for React to render, then crossfade
      (function() {
        var root = document.getElementById('root');
        var hero = document.getElementById('aarohan-prerender-hero');
        if (!root || !hero) return;
        var observer = new MutationObserver(function() {
          if (root.children.length > 0) {
            observer.disconnect();
            // Fade in React app
            root.classList.add('root-ready');
            // Fade out pre-render hero
            hero.classList.add('hero-hidden');
            // Remove from DOM after transition
            hero.addEventListener('transitionend', function() {
              hero.classList.add('hero-removed');
            }, { once: true });
            // Fallback removal if transitionend doesn't fire
            setTimeout(function() { hero.classList.add('hero-removed'); }, 500);
          }
        });
        observer.observe(root, { childList: true });
      })();
    </script>
  </body>
