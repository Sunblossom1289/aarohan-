version: '3.8'

services:
  backend:
    build: ./backend
    container_name: aarohan-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/aarohan
      - PORT=5000
    depends_on:
      - mongo

  frontend:
    build: .
    container_name: aarohan-frontend
    ports:
      - "3000:80"  # <--- CHANGED THIS LINE (External 3000 -> Internal 80)
    depends_on:
      - backend

  mongo:
    image: mongo:latest
    container_name: aarohan-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: