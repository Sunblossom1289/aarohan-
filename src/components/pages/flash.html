<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyAarohan - Flashcards</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-navy: #2D3E50;
      --accent-orange: #FFB347;
      --teal-slate: #4A7C82;
      --front-gradient-start: #72B0C3;
      --front-gradient-end: #FFFFFF;
      --back-bg-start: #E7D7B0;
      --back-bg-end: #FFFFFF;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #F4F7F6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      margin: 0;
    }

    .header-section {
      text-align: center;
      margin-bottom: 50px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
      max-width: 1200px;
      width: 100%;
    }

    .flip-card {
      background-color: transparent;
      width: 100%;
      height: 480px;
      perspective: 1000px; 
      cursor: pointer;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
      transform-style: preserve-3d;
    }

    .flip-card:hover .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-card-front, .flip-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      border-radius: 20px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 35px 25px;
      box-sizing: border-box;
      border: 1px solid rgba(0,0,0,0.03);
    }

    .flip-card-front {
      background: linear-gradient(180deg, var(--front-gradient-start) 0%, var(--front-gradient-end) 100%);
      justify-content: space-between;
    }

    .front-title {
      font-size: 30px;
      font-weight: 800;
      color: var(--primary-navy);
      margin: 10px 0 8px 0;
    }

    .badge {
      background-color: var(--accent-orange);
      color: #FFFFFF;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 18px;
      border-radius: 50px;
      display: inline-block;
      text-transform: uppercase;
      box-shadow: 0 2px 8px rgba(255, 179, 71, 0.3);
    }

    .front-media {
      width: 100%;
      height: 180px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px 0;
    }

    .front-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 12px;
    }

    .front-emoji {
      font-size: 80px;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
    }

    .tagline {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--primary-navy);
      margin: 0;
    }

    .flip-card-back {
      background: linear-gradient(180deg, var(--back-bg-start) 0%, var(--back-bg-end) 100%);
      transform: rotateY(180deg);
      justify-content: flex-start;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--primary-navy);
      margin: 10px 0 12px 0;
    }

    .objective-box {
      background-color: var(--teal-slate);
      color: #FFFFFF;
      padding: 18px;
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.5;
      font-weight: 500;
      margin-bottom: 20px;
      text-align: center;
    }

    .features-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
      width: 100%;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.4);
      padding: 10px;
      border-radius: 10px;
    }

    .feature-icon {
      font-size: 22px;
    }

    .feature-text {
      font-size: 13px;
      line-height: 1.4;
      font-weight: 600;
      color: var(--primary-navy);
      margin: 0;
    }
  </style>
</head>
<body>


  <div class="card-grid" id="grid"></div>

        ]

        ]
      },
      {

        ]
      },
      {
        title: " Udaan",

          { icon: "📖", text: "Building a 'Story of Potential' for scholarships." }
        ]
      }
    ];

    const grid = document.getElementById('grid');

    cardsData.forEach(card => {
      const featuresHTML = card.features.map(feature => `
        <div class="feature-item">
          <span class="feature-icon">${feature.icon}</span>
          <p class="feature-text">${feature.text}</p>
        </div>
      `).join('');

      // Added fallback to emoji if image fails to load
      const mediaContent = card.isImage 
        ? `<img src="${card.image}" class="front-image" alt="${card.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
           <span class="front-emoji" style="display:none;">🚀</span>`
        : `<span class="front-emoji">${card.content}</span>`;

      const cardHTML = `
        <div class="flip-card">
          <div class="flip-card-inner">
            <div class="flip-card-front">
              <div>
                <h1 class="front-title">${card.title}</h1>
                <div class="badge">${card.badge}</div>
              </div>
              <div class="front-media">
                ${mediaContent}
              </div>
              <p class="tagline">"${card.tagline}"</p>
            </div>
            <div class="flip-card-back">
              <h2 class="section-title">The Objective</h2>
              <div class="objective-box">${card.objective}</div>
              <h2 class="section-title">Key Features</h2>
              <div class="features-list">${featuresHTML}</div>
            </div>
          </div>
        </div>
      `;
      grid.innerHTML += cardHTML;
    });
  </script>
</body>
</html>
